name: e2e

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest   # ships Docker, jq, python3; nix dev shell skips the Xcode bits on Linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      # Cache /nix/store so the dev-shell closure (jdk, gradle, Android SDK) isn't re-fetched
      # every run. Keyed on flake.lock — only changes when the toolchain pins move.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - uses: gradle/actions/setup-gradle@v4

      # Pre-warm so test.sh's server-startup wait isn't racing a cold KMP build.
      - name: Build server
        run: nix develop --command ./gradlew :banalities-server:classes

      - name: Run e2e auth test
        run: ./tests/e2e/test.sh
