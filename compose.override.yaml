services:
  server:
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ISSUER: http://localhost:8081/realms/banalities

  keycloak:
    ports:
      - "8081:8080"
    environment:
      KC_HOSTNAME: http://localhost:8081

  caddy:
    profiles: ["prod"]  # excluded from default `up`; add --profile prod to include
